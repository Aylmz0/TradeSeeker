[project]
name = "tradeseeker"
version = "0.1.0"
requires-python = ">=3.10"

[tool.ruff]
# Satır uzunluğu sınırı
line-length = 100

# İzlenecek hata kodları
# E: pycodestyle errors
# F: Pyflakes
# I: isort
# B: flake8-bugbear
# UP: pyupgrade
lint.select = ["E", "F", "I", "B", "UP"]

# Göz ardı edilecek hata kodları
lint.ignore = []

[tool.ruff.format]
# Kod formatlama stili
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
