[project]
name = "tradeseeker"
version = "0.1.0"
requires-python = ">=3.10"

[tool.ruff]
# Line length limit
line-length = 100

# E/F/W: pycodestyle/pyflakes/warnings
# I: isort (import sorting)
# B: flake8-bugbear (bugs)
# UP: pyupgrade (modern python)
# SIM: flake8-simplify (simplification)
# N: pep8-naming (naming)
# PTH: flake8-use-pathlib (modern paths)
# PL: pylint (quality)
# TID: flake8-tidy-imports
# C90: mccabe (complexity)
# A: flake8-builtins (shading)
# COM: flake8-commas (trailing commas)
# T20: flake8-print (logging check)
# ERA: eradicate (dead code)
# FURB: refurb (refurbish)
lint.select = ["E", "F", "W", "I", "B", "UP", "SIM", "N", "PTH", "PL", "TID", "C90", "A", "COM", "T20", "ERA", "FURB"]

# Ignored error codes
# PLR2004: Disable magic numbers warning (frequently used in trading projects)
# T201: Allow print statements (used for console logging in this bot)
lint.ignore = ["PLR2004", "T201"]

[tool.ruff]
target-version = "py310"
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "data",
    "models",
    "logs",
    "build",
    "dist",
]

[tool.ruff.lint.mccabe]
# Complexity threshold (A function can be at most 10 units complex)
max-complexity = 10

[tool.ruff.format]
# Kod formatlama stili
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
