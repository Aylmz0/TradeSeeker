[project]
name = "tradeseeker"
version = "0.1.0"
requires-python = ">=3.10"

[tool.ruff]
# Line length limit
line-length = 100

# Followed error codes
# E: pycodestyle errors
# F: Pyflakes
# I: isort
# B: flake8-bugbear
# UP: pyupgrade
# SIM: flake8-simplify (Simplification)
# N: pep8-naming (Naming)
# PTH: flake8-use-pathlib (Modern file paths)
# PL: Pylint (Corporate standards)
# TID: flake8-tidy-imports (Tidy imports)
# C90: mccabe (Complexity control)
lint.select = ["E", "F", "I", "B", "UP", "SIM", "N", "PTH", "PL", "TID", "C90"]

# Ignored error codes
# PLR2004: Disable magic numbers warning (frequently used in trading projects)
lint.ignore = ["PLR2004"]

[tool.ruff.lint.mccabe]
# Complexity threshold (A function can be at most 10 units complex)
max-complexity = 10

[tool.ruff.format]
# Kod formatlama stili
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"
