name: Deploy TradeSeeker to VPS

on:
  push:
    branches: [ main ]

jobs:
  quality-check:
    name: Lint, Type Check & Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff ty safety detect-secrets
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Ruff Lint & Format Check
        run: ruff check . && ruff format --check .

      - name: Ty Type Check
        run: ty check

      - name: Security Scan
        run: |
          safety check
          detect-secrets scan --baseline .secrets.baseline

  deploy:
    name: Deploy to VPS
    needs: quality-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to VPS using rsync
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "."
          target: "~/TradeSeeker"
          strip_components: 0

      - name: Execute Remote SSH commands (Restart Bot)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # VPS'e gir ve botun sesini kesip yeniden başlat
            cd ~/TradeSeeker
            tmux send-keys -t tradeseeker:0 C-c Enter
            sleep 2
            tmux send-keys -t tradeseeker:0 "source .venv/bin/activate.fish" Enter
            tmux send-keys -t tradeseeker:0 "python3 src/main.py" Enter
            echo "Deployment successful: Bot restarted in tmux."
